<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Telugu AI Plagiarism Detection{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />
</head>
<body>
    <div class="gradient-bg"></div>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <header class="navbar" id="navbar">
        <div class="container navbar-inner">
            <div class="logo">
                <span class="logo-mark">తెలుగు</span>
                <span class="logo-text">PlagCheck AI</span>
            </div>
            <nav class="nav-links">
                <a href="{{ url_for('index') }}" class="nav-link {% if request.path == '/' %}active{% endif %}">Home</a>
                <a href="{{ url_for('about') }}" class="nav-link {% if request.path.startswith('/about') %}active{% endif %}">About</a>
                <a href="{{ url_for('check') }}" class="nav-link {% if request.path.startswith('/check') %}active{% endif %}">Check</a>
                <a href="{{ url_for('analysis') }}" class="nav-link {% if request.path.startswith('/analysis') %}active{% endif %}">Analysis</a>
            </nav>
            <button class="nav-toggle" id="navToggle">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <main class="page-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container footer-inner">
            <p class="footer-text">© {{ 2026 }} Telugu PlagCheck AI. All rights reserved.</p>
            <p class="footer-subtext">AI powered semantic plagiarism detection for Telugu language content.</p>
        </div>
    </footer>

    <div id="globalLoader" class="loader-overlay hidden">
        <div class="loader-spinner"></div>
        <p>Analyzing Telugu text with AI…</p>
    </div>

    <div id="toast" class="toast hidden">
        <span id="toastMessage"></span>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
